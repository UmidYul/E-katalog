<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Регистрация</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<header class="site-header">
  <div class="container header-row">
    <a href="/" class="brand"><span class="brand-mark"></span>E-katalog UZ</a>
    <nav class="nav">
      <a href="/" class="nav-link">Главная</a>
      <a href="/catalog.html" class="nav-link">Каталог</a>
      <a href="/compare.html" class="nav-link">Сравнение</a>
      <a href="/shops.html" class="nav-link">Магазины</a>
      <a href="/register.html" class="nav-link active">Регистрация</a>
    </nav>
  </div>
</header>

<main class="container">
  <h1 class="section-title">Создание аккаунта</h1>
  <section class="panel">
    <form class="form" id="registerForm">
      <label>Имя
        <input class="input" name="name" required />
      </label>
      <label>Email
        <input class="input" type="email" name="email" required />
      </label>
      <label>Пароль
        <input class="input" type="password" name="password" required minlength="6" />
      </label>
      <label>Язык интерфейса
        <select class="select" name="language">
          <option value="ru">Русский</option>
          <option value="uz">O'zbekcha</option>
        </select>
      </label>
      <button class="btn primary" type="submit">Зарегистрироваться</button>
    </form>
    <div id="registerMessage"></div>
  </section>
</main>

<footer class="site-footer"><div class="container footer-row"><span>Демо регистрация</span><span>API /api/register</span></div></footer>
<script src="/js/register.js"></script>
</body>
</html>
