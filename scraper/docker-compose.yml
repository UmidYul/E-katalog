services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scraper
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d scraper"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  app:
    build:
      context: ..
      dockerfile: scraper/docker/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/scraper}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      HTTP_VERIFY_SSL: ${HTTP_VERIFY_SSL:-true}
      HTTP_CA_BUNDLE: ${HTTP_CA_BUNDLE:-}
    volumes:
      - ./certs:/srv/scraper/certs:ro
      - ./exports:/srv/scraper/exports
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["python", "-m", "app.main"]

  worker:
    build:
      context: ..
      dockerfile: scraper/docker/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/scraper}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      HTTP_VERIFY_SSL: ${HTTP_VERIFY_SSL:-true}
      HTTP_CA_BUNDLE: ${HTTP_CA_BUNDLE:-}
    volumes:
      - ./certs:/srv/scraper/certs:ro
      - ./exports:/srv/scraper/exports
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["celery", "-A", "app.tasks.celery_app:celery_app", "worker", "--loglevel=INFO"]

  beat:
    build:
      context: ..
      dockerfile: scraper/docker/Dockerfile
    env_file:
      - path: .env
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://postgres:postgres@db:5432/scraper}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/1}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/2}
      HTTP_VERIFY_SSL: ${HTTP_VERIFY_SSL:-true}
      HTTP_CA_BUNDLE: ${HTTP_CA_BUNDLE:-}
    volumes:
      - ./certs:/srv/scraper/certs:ro
      - ./exports:/srv/scraper/exports
    depends_on:
      redis:
        condition: service_started
    command: ["celery", "-A", "app.tasks.celery_app:celery_app", "beat", "--loglevel=INFO"]

volumes:
  postgres_data:
