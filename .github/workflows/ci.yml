name: CI

on:
  push:
    branches:
      - main
      - dev
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PYTHONUNBUFFERED: "1"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      ADMIN_SEED_ENABLED: "false"
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/scraper
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API unit tests
        env:
          PYTHONPATH: services/api:.
        run: |
          python -m pytest -q --maxfail=1 --confcutdir=tests/unit \
            tests/unit/test_admin_analytics_helpers.py \
            tests/unit/test_admin_quality_helpers.py \
            tests/unit/test_catalog_schema.py \
            tests/unit/test_gallery_image_selection.py \
            tests/unit/test_openapi_contract.py \
            tests/unit/test_title_formatting.py

      - name: Run worker unit tests
        env:
          PYTHONPATH: services/worker:.
        run: |
          python -m pytest -q --maxfail=1 --confcutdir=tests/unit \
            tests/unit/test_ai_copywriting.py \
            tests/unit/test_canonical_engine.py \
            tests/unit/test_celery_routes.py \
            tests/unit/test_dedupe.py \
            tests/unit/test_embeddings.py \
            tests/unit/test_normalization.py \
            tests/unit/test_normalize_image_selection.py \
            tests/unit/test_quality_report.py

      - name: Run scraper unit tests
        env:
          PYTHONPATH: services/scraper:.
        run: |
          python -m pytest -q --maxfail=1 --confcutdir=tests/unit \
            tests/unit/test_alifshop_parser.py

      - name: Run worker integration tests
        env:
          PYTHONPATH: services/worker:.
        run: |
          python -m pytest -q --maxfail=1 --confcutdir=tests/integration tests/integration

      - name: Run AI validation tests
        env:
          PYTHONPATH: services/worker:.
        run: |
          python -m pytest -q --maxfail=1 --confcutdir=tests/ai_validation tests/ai_validation

  frontend:
    name: Frontend (lint, typecheck, test, build)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: frontend
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_API_ORIGIN: http://localhost:8000
      NEXT_PUBLIC_API_PREFIX: /api/v1
      NEXT_PUBLIC_SITE_NAME: E-katalog
      API_INTERNAL_ORIGIN: http://localhost:8000
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm run test

      - name: Build
        run: npm run build
