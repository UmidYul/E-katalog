services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scraper
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d scraper"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: ../..
      dockerfile: services/worker/Dockerfile
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      PROMETHEUS_MULTIPROC_DIR: ${PROMETHEUS_MULTIPROC_DIR:-/tmp/prometheus-multiproc}
    volumes:
      - prometheus_multiproc:/tmp/prometheus-multiproc
    command: ["sh", "-c", "mkdir -p ${PROMETHEUS_MULTIPROC_DIR:-/tmp/prometheus-multiproc} && rm -f ${PROMETHEUS_MULTIPROC_DIR:-/tmp/prometheus-multiproc}/* && celery -A app.celery_app:celery_app worker -Q normalize,dedupe,embedding,reindex,maintenance,export --concurrency=8 --loglevel=INFO"]

  beat:
    build:
      context: ../..
      dockerfile: services/worker/Dockerfile
    env_file:
      - ../../.env
    environment:
      PROMETHEUS_MULTIPROC_DIR: ${PROMETHEUS_MULTIPROC_DIR:-/tmp/prometheus-multiproc}
    depends_on:
      redis:
        condition: service_started
    volumes:
      - prometheus_multiproc:/tmp/prometheus-multiproc
    command: ["sh", "-c", "mkdir -p ${PROMETHEUS_MULTIPROC_DIR:-/tmp/prometheus-multiproc} && celery -A app.celery_app:celery_app beat --loglevel=INFO"]

  worker-metrics:
    build:
      context: ../..
      dockerfile: services/worker/Dockerfile
    env_file:
      - ../../.env
    environment:
      PROMETHEUS_MULTIPROC_DIR: ${PROMETHEUS_MULTIPROC_DIR:-/tmp/prometheus-multiproc}
      WORKER_METRICS_PORT: ${WORKER_METRICS_PORT:-9108}
    depends_on:
      worker:
        condition: service_started
    volumes:
      - prometheus_multiproc:/tmp/prometheus-multiproc
    ports:
      - "9108:9108"
    command: ["python", "-m", "app.metrics_server"]

  flower:
    build:
      context: ../..
      dockerfile: services/worker/Dockerfile
    env_file:
      - ../../.env
    depends_on:
      redis:
        condition: service_started
      worker:
        condition: service_started
    ports:
      - "5555:5555"
    command: ["celery", "-A", "app.celery_app:celery_app", "flower", "--port=5555"]

  scraper:
    build:
      context: ../..
      dockerfile: services/scraper/Dockerfile
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped
    command: ["celery", "-A", "app.tasks.celery_app:celery_app", "worker", "-Q", "scrape.high,scrape.default", "--concurrency=4", "--loglevel=INFO"]

  frontend:
    build:
      context: ../..
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost}
        NEXT_PUBLIC_API_ORIGIN: ${NEXT_PUBLIC_API_ORIGIN:-}
        NEXT_PUBLIC_API_PREFIX: ${NEXT_PUBLIC_API_PREFIX:-/api/v1}
        NEXT_PUBLIC_SITE_NAME: ${NEXT_PUBLIC_SITE_NAME:-Doxx}
        API_INTERNAL_ORIGIN: ${API_INTERNAL_ORIGIN:-http://api:8000}
    depends_on:
      api:
        condition: service_started

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      api:
        condition: service_started
      frontend:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  postgres_data:
  prometheus_multiproc:
