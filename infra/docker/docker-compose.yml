services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: scraper
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d scraper"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"

  worker:
    build:
      context: ../..
      dockerfile: services/worker/Dockerfile
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: ["celery", "-A", "app.celery_app:celery_app", "worker", "-Q", "scrape.high,scrape.default,normalize,dedupe,embedding,reindex,maintenance,export", "--concurrency=8", "--loglevel=INFO"]

  beat:
    build:
      context: ../..
      dockerfile: services/worker/Dockerfile
    env_file:
      - ../../.env
    depends_on:
      redis:
        condition: service_started
    command: ["celery", "-A", "app.celery_app:celery_app", "beat", "--loglevel=INFO"]

  scraper:
    build:
      context: ../..
      dockerfile: services/scraper/Dockerfile
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

volumes:
  postgres_data:
