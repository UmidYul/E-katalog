upstream api_upstream {
    server api:8000;
    keepalive 32;
}

upstream frontend_upstream {
    server frontend:3000;
    keepalive 32;
}

limit_req_zone $binary_remote_addr zone=search_rate:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_rate:10m rate=120r/m;

server {
    listen 80;
    server_name _;

    client_max_body_size 2m;

    location /api/v1/search {
        limit_req zone=search_rate burst=20 nodelay;
        proxy_pass http://api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/ {
        limit_req zone=api_rate burst=40 nodelay;
        proxy_pass http://api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
